<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Amor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;

            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            margin-bottom: 20px;
        }

        #loveText {
            font-size: 22px;
            margin: 20px 0;
            min-height: 30px;
            transition: 0.3s;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        .back {
            margin-top: 15px;
            background: transparent;
            border: 1px solid #3b82f6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>💙 Gerador de Amor</h1>

        <p id="loveText">Clique no botão</p>

        <button onclick="gerarAmor()">Gerar</button>

        <br>

        <button class="back" onclick="history.back()">Voltar</button>
    </div>

    <script>
        const frasesAmor = [
    "Eu te amo 🇧🇷",
    "I love you 🇺🇸",
    "Te amo 🇪🇸",
    "Je t’aime 🇫🇷",
    "Ti amo 🇮🇹",
    "Ich liebe dich 🇩🇪",
    "Ik hou van jou 🇳🇱",
    "Jag älskar dig 🇸🇪",
    "Jeg elsker deg 🇳🇴",
    "Jeg elsker dig 🇩🇰",
    "Minä rakastan sinua 🇫🇮",
    "Kocham cię 🇵🇱",
    "Miluji tě 🇨🇿",
    "Ľúbim ťa 🇸🇰",
    "Te iubesc 🇷🇴",
    "Σ' αγαπώ 🇬🇷",
    "Seni seviyorum 🇹🇷",
    "Я тебя люблю 🇷🇺",
    "我爱你 🇨🇳",
    "愛してる 🇯🇵",
    "사랑해 🇰🇷",
    "मैं तुमसे प्यार करता हूँ 🇮🇳",
    "আমি তোমায় ভালোবাসি 🇧🇩",
    "میں تم سے پیار کرتا ہوں 🇵🇰",
    "ฉันรักคุณ 🇹🇭",
    "Anh yêu em 🇻🇳",
    "Aku cinta kamu 🇮🇩",
    "Mahal kita 🇵🇭",
    "Saya cinta kamu 🇲🇾",
    "אני אוהב אותך 🇮🇱",
    "دوستت دارم 🇮🇷",
    "Ngiyakuthanda 🇿🇦",
    "Ninakupenda 🇰🇪",
    "Mo nifẹ rẹ 🇳🇬",
    "Ke a go rata 🇧🇼",
    "Te aroha nei au i a koe 🇳🇿"
        ];

        function gerarAmor() {
            const texto = document.getElementById("loveText");

            const aleatorio = Math.floor(Math.random() * frasesAmor.length);

            texto.style.opacity = 0;

            setTimeout(() => {
                texto.textContent = frasesAmor[aleatorio];
                texto.style.opacity = 1;
            }, 150);
        }
    </script>
</body>
</html>
